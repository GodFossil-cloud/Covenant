<!-- Reliquary panel shell (Jekyll include).
     IDs and ARIA hooks are referenced by assets/reliquary.js; do not rename. -->
<div class="reliquary-overlay" id="reliquaryOverlay" aria-hidden="true"></div>

<div class="reliquary-panel" id="reliquaryPanel" aria-hidden="true" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="reliquaryPanelTitle">
  <div class="reliquary-panel-header">
    <!-- Drag handle region (sheet-style gesture). -->
    <div class="reliquary-drag-region" id="reliquaryDragRegion" aria-hidden="true"></div>

    <!-- Screen-reader label. -->
    <div class="reliquary-panel-title sr-only" id="reliquaryPanelTitle">Reliquary</div>

    <!-- Internal tabs (session remembers last view; default = Reliquary). -->
    <div class="reliquary-tabs" role="tablist" aria-label="Reliquary tabs">
      <button type="button" class="reliquary-tab" id="reliquaryTabArchive" role="tab" aria-selected="true" aria-controls="reliquaryViewArchive" tabindex="0">Reliquary</button>
      <button type="button" class="reliquary-tab" id="reliquaryTabGlossary" role="tab" aria-selected="false" aria-controls="reliquaryViewGlossary" tabindex="-1">Glossary</button>
    </div>
  </div>

  <div class="reliquary-panel-body">
    <section class="reliquary-view" id="reliquaryViewArchive" role="tabpanel" aria-labelledby="reliquaryTabArchive">
      <div class="reliquary-archive" id="reliquaryArchive" aria-label="Saved passages"></div>
      <div class="reliquary-placeholder" id="reliquaryPlaceholder" role="note"></div>
    </section>

    <section class="reliquary-view" id="reliquaryViewGlossary" role="tabpanel" aria-labelledby="reliquaryTabGlossary" hidden>
      <div class="reliquary-glossary" id="reliquaryGlossary" aria-label="Glossary terms on this page"></div>

      <!-- Match the ToC panel's footer-link style (toc.css), tuned for Reliquary ink. -->
      <div class="toc-annex">
        <a class="toc-annex-link" href="{{ '/lexicon.html' | relative_url }}" target="_blank" rel="noopener">
          <span class="toc-annex-sigil" aria-hidden="true">✦</span>
          <span class="toc-annex-text">FULL LEXICON</span>
        </a>
      </div>
    </section>

    <div id="reliquaryLiveRegion" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <noscript>
      <p>JavaScript is required to open the Reliquary.</p>
    </noscript>
  </div>
</div>
