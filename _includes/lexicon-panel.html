<!-- Lexicon panel shell (Jekyll include).
     IDs and ARIA hooks are referenced by assets/lexicon.js; do not rename. -->
<div class="lexicon-overlay" id="lexiconOverlay" aria-hidden="true"></div>

<div class="lexicon-panel" id="lexiconPanel" aria-hidden="true" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="lexiconPanelTitle">
  <div class="lexicon-drag-region" id="lexiconDragRegion">
    <div class="lexicon-drag-handle" aria-hidden="true">
      <span class="lexicon-drag-pill" aria-hidden="true"></span>
      <span class="lexicon-drag-star" aria-hidden="true">𖤓</span>
    </div>
  </div>

  <div class="lexicon-panel-header">
    <!-- Seal slot: assets/lexicon.js will temporarily move #lexiconToggle here while the panel is open (desktop/tablet). -->
    <div class="lexicon-panel-seal-slot" id="lexiconSealSlot"></div>

    <div id="lexiconHeaderText">
      <!-- Mode label sits above the title: smaller, contextual (Overview / citation). -->
      <div class="lexicon-panel-mode" id="lexiconModeLabel"></div>
      <!-- Title is the larger, stable page-name line. -->
      <div class="lexicon-panel-title" id="lexiconPanelTitle">Lexicon</div>
    </div>
  </div>

  <div class="lexicon-panel-body">
    <!-- Collapsible Overview section (always the first entry) -->
    <section class="lexicon-overview" id="lexiconOverview">
      <!-- JS will inject the page Overview here -->
    </section>

    <!-- Ledger: all selectable passages on this page -->
    <section class="lexicon-passage-ledger"
             id="lexiconPassageLedger"
             aria-label="Passages on this page">
      <!-- JS will inject passage entries here -->
    </section>

    <!-- Hidden scratchpad preserved for compatibility -->
    <div id="lexiconDynamicContent" hidden></div>
  </div>
</div>

<!-- Glossary HTML is stashed here (page passes include.glossary) via Jekyll so the Reliquary panel can render it in its Glossary tab. -->
<div id="covenantGlossaryStash" hidden>
  {{ include.glossary | default: "" }}
</div>
