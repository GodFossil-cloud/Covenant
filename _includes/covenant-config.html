<!-- Head-loaded: stabilize dock geometry on first paint (iPhone Safari). -->
<link rel="stylesheet" href="assets/footer-overrides.css?v=68">

<script>
  (function () {
    var ua = navigator.userAgent || '';
    var platform = navigator.platform || '';
    var isIOSDevice = /iPad|iPhone|iPod/.test(ua);
    var isIPadOS = (platform === 'MacIntel' && navigator.maxTouchPoints && navigator.maxTouchPoints > 1);
    if (!(isIOSDevice || isIPadOS)) return;
    if (window.__COVENANT_LEXICON_SCROLL_SHIM__) return;
    if (typeof window.addEventListener !== 'function') return;

    var nativeAddEventListener = window.addEventListener;
    window.__COVENANT_LEXICON_SCROLL_SHIM__ = true;

    window.addEventListener = function (type, listener, options) {
      if (
        type === 'scroll'
        && typeof listener === 'function'
        && listener.name === 'scheduleIOSMidRestViewportResync'
      ) {
        return;
      }

      return nativeAddEventListener.call(this, type, listener, options);
    };

    document.addEventListener('DOMContentLoaded', function () {
      window.addEventListener = nativeAddEventListener;
    }, { once: true });
  })();
</script>
