<script>
  (function () {
    if (window.__COVENANT_LEXICON_SETTLE_HOLD__) return;
    window.__COVENANT_LEXICON_SETTLE_HOLD__ = true;

    function getSeal() {
      return document.getElementById('lexiconToggle');
    }

    function getSnapMs() {
      try {
        var root = document.documentElement;
        var value = window.getComputedStyle(root).getPropertyValue('--lexicon-snap-duration') || '';
        var n = parseFloat(String(value).trim());
        return isFinite(n) ? n : 420;
      } catch (err) {
        return 420;
      }
    }

    function readInlineDragY(seal) {
      if (!seal || !seal.style) return 0;
      var raw = seal.style.getPropertyValue('--seal-drag-y') || '';
      var n = parseFloat(String(raw).trim());
      return isFinite(n) ? n : 0;
    }

    function cacheDragY(seal) {
      var y = readInlineDragY(seal);
      if (Math.abs(y) > 0.5) seal.__covenantLastDragY = y;
      return y;
    }

    function clearHoldTimer(seal) {
      if (!seal || !seal.__covenantSettleHoldTimer__) return;
      window.clearTimeout(seal.__covenantSettleHoldTimer__);
      seal.__covenantSettleHoldTimer__ = null;
    }

    function setLiftedLayer(seal, active) {
      if (!seal) return;

      if (active) {
        seal.style.position = 'relative';
        seal.style.zIndex = '12';
        return;
      }

      seal.style.position = '';
      seal.style.zIndex = '';
    }

    function releaseHold(seal) {
      if (!seal) return;
      if (
        seal.classList.contains('is-seal-dragging') ||
        seal.classList.contains('is-seal-settling') ||
        seal.classList.contains('is-tap-opening') ||
        seal.classList.contains('is-tap-closing')
      ) return;

      clearHoldTimer(seal);
      seal.__covenantSettleActive = false;
      seal.style.removeProperty('--seal-drag-y');
      setLiftedLayer(seal, false);
    }

    function animateSettleCarry(seal) {
      var startY;

      if (!seal) return;

      startY = cacheDragY(seal);
      if (Math.abs(startY) <= 0.5) startY = seal.__covenantLastDragY || 0;

      clearHoldTimer(seal);
      seal.__covenantSettleActive = true;
      setLiftedLayer(seal, true);

      seal.style.setProperty('--seal-drag-y', startY + 'px');
      seal.offsetHeight;

      window.requestAnimationFrame(function () {
        if (!seal.classList.contains('is-seal-settling')) return;
        seal.style.setProperty('--seal-drag-y', '0px');
      });

      seal.__covenantSettleHoldTimer__ = window.setTimeout(function () {
        releaseHold(seal);
      }, getSnapMs() + 120);
    }

    function sync() {
      var seal = getSeal();
      if (!seal) return;

      cacheDragY(seal);

      if (seal.classList.contains('is-seal-settling')) {
        if (!seal.__covenantSettleActive) animateSettleCarry(seal);
        else setLiftedLayer(seal, true);
        return;
      }

      releaseHold(seal);
    }

    function init() {
      var seal = getSeal();
      if (!seal) return;

      try {
        var observer = new MutationObserver(function () {
          sync();
        });

        observer.observe(seal, {
          attributes: true,
          attributeFilter: ['class', 'style']
        });
      } catch (err) {}

      seal.addEventListener('transitionend', function (e) {
        if (e && e.propertyName && e.propertyName !== 'transform') return;
        sync();
      });

      sync();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init, { once: true });
    } else {
      init();
    }
  })();
</script>

<script>
  (function () {
    var ua = navigator.userAgent || '';
    var platform = navigator.platform || '';
    var isIOSDevice = /iPad|iPhone|iPod/.test(ua);
    var isIPadOS = (platform === 'MacIntel' && navigator.maxTouchPoints && navigator.maxTouchPoints > 1);
    if (!(isIOSDevice || isIPadOS)) return;
    if (window.__COVENANT_LEXICON_MIDREST_WELD__) return;
    window.__COVENANT_LEXICON_MIDREST_WELD__ = true;

    var placeholder = null;
    var dockParent = null;
    var sealInHeader = false;
    var observer = null;
    var restoreTimer = null;
    var dockCarryTimer = null;

    function isMobileBottomSheet() {
      return !!(window.matchMedia && window.matchMedia('(max-width: 600px)').matches);
    }

    function getPanel() {
      return document.getElementById('lexiconPanel');
    }

    function getSeal() {
      return document.getElementById('lexiconToggle');
    }

    function getSealSlot() {
      return document.getElementById('lexiconSealSlot');
    }

    function getHeader() {
      var slot = getSealSlot();
      return slot ? slot.parentNode : null;
    }

    function getHeaderText() {
      return document.getElementById('lexiconHeaderText');
    }

    function getCloseButton() {
      var panel = getPanel();
      return panel ? panel.querySelector('.lexicon-panel-close') : null;
    }

    function getModeLabel() {
      return document.getElementById('lexiconModeLabel');
    }

    function clearRestoreTimer() {
      if (!restoreTimer) return;
      window.clearTimeout(restoreTimer);
      restoreTimer = null;
    }

    function clearDockCarryTimer() {
      if (!dockCarryTimer) return;
      window.clearTimeout(dockCarryTimer);
      dockCarryTimer = null;
    }

    function getTapMotionMs() {
      try {
        var root = document.documentElement;
        var value = window.getComputedStyle(root).getPropertyValue('--lexicon-snap-duration') || '';
        var n = parseFloat(String(value).trim());
        return isFinite(n) ? n : 420;
      } catch (err) {
        return 420;
      }
    }

    function ensurePlaceholder() {
      if (placeholder) return placeholder;

      var el = document.createElement('span');
      el.setAttribute('aria-hidden', 'true');
      el.style.display = 'block';
      el.style.width = 'var(--seal-size, 56px)';
      el.style.height = 'var(--seal-size, 56px)';
      el.style.pointerEvents = 'none';
      placeholder = el;
      return el;
    }

    function shouldWeldSeal() {
      var panel = getPanel();
      if (!isMobileBottomSheet() || !panel) return false;
      return panel.classList.contains('is-open') && panel.getAttribute('data-lexicon-snap') === 'mid';
    }

    function shouldHoldSealForClosingTrace() {
      var panel = getPanel();
      var seal = getSeal();
      if (!isMobileBottomSheet() || !panel || !seal || !sealInHeader) return false;
      if (panel.classList.contains('is-open')) return false;

      return (
        seal.classList.contains('is-tap-closing') ||
        seal.classList.contains('is-seal-settling') ||
        seal.classList.contains('is-seal-dragging')
      );
    }

    function syncGlyphPairForHeader(isWelded) {
      var seal = getSeal();
      if (!seal) return;

      var idle = seal.querySelector('.lexicon-glyph--idle');
      var active = seal.querySelector('.lexicon-glyph--active');
      if (!idle || !active) return;

      if (isWelded) {
        idle.style.display = 'none';
        active.style.display = 'inline-block';
        active.style.visibility = 'visible';
        active.style.opacity = '1';
      } else {
        idle.style.display = '';
        active.style.display = '';
        active.style.visibility = '';
        active.style.opacity = '';
      }
    }

    function syncWeldedGlyphScale(isWelded) {
      var seal = getSeal();
      if (!seal) return;

      var idle = seal.querySelector('.lexicon-glyph--idle');
      var active = seal.querySelector('.lexicon-glyph--active');
      if (!idle || !active) return;

      if (isWelded) {
        idle.style.transform = 'scale(0.88)';
        active.style.transform = 'scale(0.88)';
        idle.style.transformOrigin = '50% 50%';
        active.style.transformOrigin = '50% 50%';
      } else {
        idle.style.transform = '';
        active.style.transform = '';
        idle.style.transformOrigin = '';
        active.style.transformOrigin = '';
      }
    }

    function setDockCarryLayer(seal, active) {
      if (!seal) return;

      if (active) {
        seal.style.position = 'relative';
        seal.style.zIndex = '12';
        return;
      }

      seal.style.position = '';
      seal.style.zIndex = '';
    }

    function animateDockReturnFromHeader(seal, fromRect) {
      var toRect;
      var deltaY;
      var duration = getTapMotionMs() + 80;

      if (!seal) return;

      clearDockCarryTimer();
      setDockCarryLayer(seal, true);

      try {
        toRect = seal.getBoundingClientRect();
      } catch (err) {
        toRect = null;
      }

      deltaY = (fromRect && toRect) ? (fromRect.top - toRect.top) : 0;
      if (!isFinite(deltaY) || Math.abs(deltaY) < 0.5) {
        seal.style.removeProperty('--seal-drag-y');
        dockCarryTimer = window.setTimeout(function () {
          dockCarryTimer = null;
          seal.style.removeProperty('--seal-drag-y');
          setDockCarryLayer(seal, false);
        }, 140);
        return;
      }

      seal.style.setProperty('--seal-drag-y', deltaY + 'px');
      seal.offsetHeight;

      window.requestAnimationFrame(function () {
        seal.style.setProperty('--seal-drag-y', '0px');
      });

      dockCarryTimer = window.setTimeout(function () {
        dockCarryTimer = null;
        seal.style.removeProperty('--seal-drag-y');
        setDockCarryLayer(seal, false);
      }, duration);
    }

    function applyWeldedHeaderLayout() {
      var slot = getSealSlot();
      var header = getHeader();
      var headerText = getHeaderText();
      var closeBtn = getCloseButton();
      var modeLabel = getModeLabel();
      if (!slot || !header) return;

      header.style.position = 'relative';
      header.style.display = 'flex';
      header.style.alignItems = 'center';
      header.style.justifyContent = 'flex-start';
      header.style.gap = '12px';
      header.style.flexWrap = 'nowrap';
      header.style.paddingTop = '';
      header.style.gridTemplateColumns = '';
      header.style.columnGap = '';
      header.style.rowGap = '';

      slot.style.display = 'flex';
      slot.style.alignItems = 'center';
      slot.style.justifyContent = 'center';
      slot.style.position = 'absolute';
      slot.style.left = '50%';
      slot.style.top = 'calc(50% - 34px)';
      slot.style.transform = 'translate(-50%, -50%)';
      slot.style.flex = '0 0 auto';
      slot.style.width = 'auto';
      slot.style.order = '';
      slot.style.gridColumn = '';
      slot.style.justifySelf = '';
      slot.style.zIndex = '1';

      if (headerText) {
        headerText.style.flex = '0 1 calc(50% - 48px)';
        headerText.style.maxWidth = 'calc(50% - 48px)';
        headerText.style.width = 'auto';
        headerText.style.minWidth = '0';
        headerText.style.alignItems = 'flex-start';
        headerText.style.textAlign = 'left';
        headerText.style.order = '1';
        headerText.style.gridColumn = '';
        headerText.style.justifySelf = '';
      }

      if (modeLabel) {
        modeLabel.style.whiteSpace = 'nowrap';
        modeLabel.style.overflow = 'hidden';
        modeLabel.style.textOverflow = 'ellipsis';
      }

      if (closeBtn) {
        closeBtn.style.position = 'relative';
        closeBtn.style.top = '';
        closeBtn.style.right = '';
        closeBtn.style.marginLeft = 'auto';
        closeBtn.style.order = '2';
        closeBtn.style.gridColumn = '';
        closeBtn.style.justifySelf = '';
        closeBtn.style.zIndex = '2';
      }
    }

    function clearWeldedHeaderLayout() {
      var slot = getSealSlot();
      var header = getHeader();
      var headerText = getHeaderText();
      var closeBtn = getCloseButton();
      var modeLabel = getModeLabel();

      if (header) {
        header.style.position = '';
        header.style.display = '';
        header.style.alignItems = '';
        header.style.justifyContent = '';
        header.style.gap = '';
        header.style.flexWrap = '';
        header.style.paddingTop = '';
        header.style.gridTemplateColumns = '';
        header.style.columnGap = '';
        header.style.rowGap = '';
      }

      if (slot) {
        slot.style.display = '';
        slot.style.alignItems = '';
        slot.style.justifyContent = '';
        slot.style.position = '';
        slot.style.left = '';
        slot.style.top = '';
        slot.style.transform = '';
        slot.style.flex = '';
        slot.style.width = '';
        slot.style.order = '';
        slot.style.gridColumn = '';
        slot.style.justifySelf = '';
        slot.style.zIndex = '';
      }

      if (headerText) {
        headerText.style.flex = '';
        headerText.style.maxWidth = '';
        headerText.style.width = '';
        headerText.style.minWidth = '';
        headerText.style.alignItems = '';
        headerText.style.textAlign = '';
        headerText.style.order = '';
        headerText.style.gridColumn = '';
        headerText.style.justifySelf = '';
      }

      if (modeLabel) {
        modeLabel.style.whiteSpace = '';
        modeLabel.style.overflow = '';
        modeLabel.style.textOverflow = '';
      }

      if (closeBtn) {
        closeBtn.style.position = '';
        closeBtn.style.top = '';
        closeBtn.style.right = '';
        closeBtn.style.marginLeft = '';
        closeBtn.style.order = '';
        closeBtn.style.gridColumn = '';
        closeBtn.style.justifySelf = '';
        closeBtn.style.zIndex = '';
      }
    }

    function weldSealIntoHeader() {
      var seal = getSeal();
      var slot = getSealSlot();
      if (!seal || !slot || sealInHeader) return;

      clearRestoreTimer();
      clearDockCarryTimer();
      setDockCarryLayer(seal, false);

      dockParent = seal.parentNode;
      if (!dockParent) return;

      try {
        dockParent.insertBefore(ensurePlaceholder(), seal);
      } catch (err0) {}

      applyWeldedHeaderLayout();

      seal.classList.remove('is-pulsing', 'is-nudging', 'is-tap-opening', 'is-seal-dragging', 'is-seal-settling');
      seal.classList.add('is-seal-in-header');
      seal.style.transform = 'none';
      seal.style.margin = '0';
      seal.style.width = '52px';
      seal.style.height = '52px';
      seal.style.removeProperty('--seal-drag-y');
      slot.appendChild(seal);
      sealInHeader = true;
      syncGlyphPairForHeader(true);
      syncWeldedGlyphScale(true);
    }

    function restoreSealToDock() {
      var seal = getSeal();
      var fromRect = null;
      if (!seal || !sealInHeader || !dockParent) return;

      clearRestoreTimer();
      clearDockCarryTimer();

      try {
        fromRect = seal.getBoundingClientRect();
      } catch (err0) {
        fromRect = null;
      }

      try {
        if (placeholder && placeholder.parentNode === dockParent) {
          dockParent.insertBefore(seal, placeholder);
          dockParent.removeChild(placeholder);
        } else {
          dockParent.appendChild(seal);
        }
      } catch (err1) {}

      seal.classList.remove('is-seal-in-header');
      seal.style.transform = '';
      seal.style.margin = '';
      seal.style.width = '';
      seal.style.height = '';
      placeholder = null;
      dockParent = null;
      sealInHeader = false;
      syncGlyphPairForHeader(false);
      syncWeldedGlyphScale(false);
      clearWeldedHeaderLayout();
      animateDockReturnFromHeader(seal, fromRect);
    }

    function scheduleRestoreToDock() {
      if (restoreTimer) return;
      restoreTimer = window.setTimeout(function () {
        restoreTimer = null;
        restoreSealToDock();
      }, getTapMotionMs() + 80);
    }

    function syncSealAttachment() {
      if (shouldWeldSeal()) {
        clearRestoreTimer();
        weldSealIntoHeader();
        return;
      }

      if (shouldHoldSealForClosingTrace()) {
        scheduleRestoreToDock();
        return;
      }

      restoreSealToDock();
    }

    function attachObserver() {
      var panel = getPanel();
      if (!panel || observer) return;

      observer = new MutationObserver(function () {
        syncSealAttachment();
      });

      observer.observe(panel, {
        attributes: true,
        attributeFilter: ['class', 'data-lexicon-snap']
      });
    }

    function init() {
      attachObserver();
      syncSealAttachment();

      window.addEventListener('resize', syncSealAttachment, { passive: true });
      window.addEventListener('orientationchange', syncSealAttachment);
      window.addEventListener('scroll', syncSealAttachment, { passive: true });
      document.addEventListener('visibilitychange', syncSealAttachment);
      window.addEventListener('pageshow', syncSealAttachment);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init, { once: true });
    } else {
      init();
    }
  })();
</script>
