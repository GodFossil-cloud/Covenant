<!-- Head-loaded: stabilize dock geometry on first paint (iPhone Safari). -->
<link rel="stylesheet" href="assets/footer-overrides.css?v=68">

<script>
  (function () {
    var ua = navigator.userAgent || '';
    var platform = navigator.platform || '';
    var isIOSDevice = /iPad|iPhone|iPod/.test(ua);
    var isIPadOS = (platform === 'MacIntel' && navigator.maxTouchPoints && navigator.maxTouchPoints > 1);
    if (!(isIOSDevice || isIPadOS)) return;
    if (window.__COVENANT_LEXICON_MIDREST_WELD__) return;
    window.__COVENANT_LEXICON_MIDREST_WELD__ = true;

    var placeholder = null;
    var dockParent = null;
    var sealInHeader = false;
    var observer = null;

    function isMobileBottomSheet() {
      return !!(window.matchMedia && window.matchMedia('(max-width: 600px)').matches);
    }

    function getPanel() {
      return document.getElementById('lexiconPanel');
    }

    function getSeal() {
      return document.getElementById('lexiconToggle');
    }

    function getSealSlot() {
      return document.getElementById('lexiconSealSlot');
    }

    function getHeader() {
      var slot = getSealSlot();
      return slot ? slot.parentNode : null;
    }

    function getHeaderText() {
      return document.getElementById('lexiconHeaderText');
    }

    function getCloseButton() {
      var panel = getPanel();
      return panel ? panel.querySelector('.lexicon-panel-close') : null;
    }

    function ensurePlaceholder() {
      if (placeholder) return placeholder;

      var el = document.createElement('span');
      el.setAttribute('aria-hidden', 'true');
      el.style.display = 'block';
      el.style.width = 'var(--seal-size, 56px)';
      el.style.height = 'var(--seal-size, 56px)';
      el.style.pointerEvents = 'none';
      placeholder = el;
      return el;
    }

    function shouldWeldSeal() {
      var panel = getPanel();
      if (!isMobileBottomSheet() || !panel) return false;
      return panel.classList.contains('is-open') && panel.getAttribute('data-lexicon-snap') === 'mid';
    }

    function syncGlyphPairForHeader(isWelded) {
      var seal = getSeal();
      if (!seal) return;

      var idle = seal.querySelector('.lexicon-glyph--idle');
      var active = seal.querySelector('.lexicon-glyph--active');
      if (!idle || !active) return;

      if (isWelded) {
        idle.style.display = 'none';
        active.style.display = 'inline-block';
        active.style.visibility = 'visible';
        active.style.opacity = '1';
      } else {
        idle.style.display = '';
        active.style.display = '';
        active.style.visibility = '';
        active.style.opacity = '';
      }
    }

    function applyCenteredHeaderLayout() {
      var slot = getSealSlot();
      var header = getHeader();
      var headerText = getHeaderText();
      var closeBtn = getCloseButton();
      if (!slot || !header) return;

      header.style.position = 'relative';
      header.style.justifyContent = 'center';
      header.style.alignItems = 'center';
      header.style.flexWrap = 'wrap';
      header.style.gap = '6px 12px';
      header.style.paddingTop = '14px';

      slot.style.display = 'flex';
      slot.style.alignItems = 'center';
      slot.style.justifyContent = 'center';
      slot.style.flex = '0 0 100%';
      slot.style.width = '100%';
      slot.style.order = '0';

      if (headerText) {
        headerText.style.flex = '0 0 100%';
        headerText.style.width = '100%';
        headerText.style.minWidth = '0';
        headerText.style.alignItems = 'center';
        headerText.style.textAlign = 'center';
      }

      if (closeBtn) {
        closeBtn.style.position = 'absolute';
        closeBtn.style.top = '12px';
        closeBtn.style.right = '14px';
        closeBtn.style.marginLeft = '0';
      }
    }

    function clearCenteredHeaderLayout() {
      var slot = getSealSlot();
      var header = getHeader();
      var headerText = getHeaderText();
      var closeBtn = getCloseButton();

      if (header) {
        header.style.position = '';
        header.style.justifyContent = '';
        header.style.alignItems = '';
        header.style.flexWrap = '';
        header.style.gap = '';
        header.style.paddingTop = '';
      }

      if (slot) {
        slot.style.display = '';
        slot.style.alignItems = '';
        slot.style.justifyContent = '';
        slot.style.flex = '';
        slot.style.width = '';
        slot.style.order = '';
      }

      if (headerText) {
        headerText.style.flex = '';
        headerText.style.width = '';
        headerText.style.minWidth = '';
        headerText.style.alignItems = '';
        headerText.style.textAlign = '';
      }

      if (closeBtn) {
        closeBtn.style.position = '';
        closeBtn.style.top = '';
        closeBtn.style.right = '';
        closeBtn.style.marginLeft = '';
      }
    }

    function weldSealIntoHeader() {
      var seal = getSeal();
      var slot = getSealSlot();
      if (!seal || !slot || sealInHeader) return;

      dockParent = seal.parentNode;
      if (!dockParent) return;

      try {
        dockParent.insertBefore(ensurePlaceholder(), seal);
      } catch (err0) {}

      applyCenteredHeaderLayout();

      seal.classList.remove('is-pulsing', 'is-nudging', 'is-tap-opening', 'is-tap-closing', 'is-seal-dragging', 'is-seal-settling');
      seal.classList.add('is-seal-in-header');
      seal.style.transform = 'none';
      seal.style.margin = '0 auto';
      seal.style.removeProperty('--seal-drag-y');
      slot.appendChild(seal);
      sealInHeader = true;
      syncGlyphPairForHeader(true);
    }

    function restoreSealToDock() {
      var seal = getSeal();
      if (!seal || !sealInHeader || !dockParent) return;

      try {
        if (placeholder && placeholder.parentNode === dockParent) {
          dockParent.insertBefore(seal, placeholder);
          dockParent.removeChild(placeholder);
        } else {
          dockParent.appendChild(seal);
        }
      } catch (err1) {}

      seal.classList.remove('is-seal-in-header');
      seal.style.transform = '';
      seal.style.margin = '';
      placeholder = null;
      dockParent = null;
      sealInHeader = false;
      syncGlyphPairForHeader(false);
      clearCenteredHeaderLayout();
    }

    function syncSealAttachment() {
      if (shouldWeldSeal()) weldSealIntoHeader();
      else restoreSealToDock();
    }

    function attachObserver() {
      var panel = getPanel();
      if (!panel || observer) return;

      observer = new MutationObserver(function () {
        syncSealAttachment();
      });

      observer.observe(panel, {
        attributes: true,
        attributeFilter: ['class', 'data-lexicon-snap']
      });
    }

    function init() {
      attachObserver();
      syncSealAttachment();

      window.addEventListener('resize', syncSealAttachment, { passive: true });
      window.addEventListener('orientationchange', syncSealAttachment);
      window.addEventListener('scroll', syncSealAttachment, { passive: true });
      document.addEventListener('visibilitychange', syncSealAttachment);
      window.addEventListener('pageshow', syncSealAttachment);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init, { once: true });
    } else {
      init();
    }
  })();
</script>
